name: Publish Nexus Idleon Companion

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/release-v3.yml"
      - "source-payload/**"
      - "CHANGELOG.md"

permissions:
  contents: write

concurrency:
  group: publish-nexus-idleon-${{ github.ref }}
  cancel-in-progress: true

env:
  VERSION: "0.5.2"
  EXE_NAME: "Nexus-Idleon-Companion-v0.5.2-x64.exe"
  PORTABLE_NAME: "Nexus-Idleon-Companion-v0.5.2-Portable-x64.zip"
  SOURCE_NAME: "Nexus-Idleon-Companion-v0.5.2-Source.zip"
  CHECKSUM_NAME: "Nexus-Idleon-Companion-v0.5.2-x64.sha256.txt"
  SOURCE_SHA256: "b8c596e86b7a0c3be757d98dea8b99a729488a10c9ad6cef219e437629220d34"

jobs:
  publish:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: false

      - name: Reconstruct verified source
        id: reconstruct
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force build, dist | Out-Null
          $partNames = @(
            "part-000a", "part-000b", "part-000c", "part-000d", "part-000e", "part-000f",
            "part-001a", "part-001b", "part-001ca", "part-001cb", "part-001cc", "part-001cd", "part-001d", "part-001e", "part-001f",
            "part-002a", "part-002b", "part-002c", "part-002d", "part-002e", "part-002f",
            "part-003", "part-004", "part-005", "part-006", "part-007"
          )
          $encodedParts = foreach ($name in $partNames) {
            $path = Join-Path "source-payload" $name
            if (-not (Test-Path -LiteralPath $path)) { throw "Missing source payload part: $path" }
            (Get-Content -Raw -LiteralPath $path).Trim()
          }
          $bytes = [Convert]::FromBase64String(($encodedParts -join ''))
          $sourceZip = Join-Path $env:RUNNER_TEMP $env:SOURCE_NAME
          [IO.File]::WriteAllBytes($sourceZip, $bytes)
          $actual = (Get-FileHash -LiteralPath $sourceZip -Algorithm SHA256).Hash.ToLowerInvariant()
          Write-Host "Reconstructed source bytes: $($bytes.Length)"
          Write-Host "Reconstructed source SHA-256: $actual"
          if ($actual -ne $env:SOURCE_SHA256) {
            throw "Source verification failed. Expected $env:SOURCE_SHA256, received $actual."
          }
          Expand-Archive -LiteralPath $sourceZip -DestinationPath build -Force
          Copy-Item -LiteralPath $sourceZip -Destination (Join-Path dist $env:SOURCE_NAME) -Force
          $sourceDir = Get-ChildItem -LiteralPath build -Directory | Select-Object -First 1
          if (-not $sourceDir) { throw "Verified source archive contains no project directory." }
          "SOURCE_DIR=$($sourceDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Test source
        id: tests
        shell: pwsh
        run: |
          Push-Location $env:SOURCE_DIR
          try { go test ./... } finally { Pop-Location }

      - name: Vet source
        id: vet
        shell: pwsh
        run: |
          Push-Location $env:SOURCE_DIR
          try { go vet ./... } finally { Pop-Location }

      - name: Build Windows x64 executable
        id: build
        shell: pwsh
        run: |
          $output = Join-Path $env:GITHUB_WORKSPACE "dist/$env:EXE_NAME"
          $env:GOOS = "windows"
          $env:GOARCH = "amd64"
          $env:CGO_ENABLED = "0"
          Push-Location $env:SOURCE_DIR
          try { go build -trimpath -ldflags "-s -w -H=windowsgui" -o $output . } finally { Pop-Location }
          if (-not (Test-Path -LiteralPath $output)) { throw "Build completed without producing $output." }

      - name: Package downloadable files
        id: package
        shell: pwsh
        run: |
          $exe = Join-Path dist $env:EXE_NAME
          $hash = (Get-FileHash -LiteralPath $exe -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $env:EXE_NAME" | Set-Content -LiteralPath (Join-Path dist $env:CHECKSUM_NAME) -Encoding ascii
          $portableDir = Join-Path $env:RUNNER_TEMP "nexus-idleon-portable"
          Remove-Item -LiteralPath $portableDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $portableDir | Out-Null
          Copy-Item -LiteralPath $exe -Destination (Join-Path $portableDir $env:EXE_NAME)
          @"
          Nexus Idleon Companion $env:VERSION

          1. Extract this ZIP.
          2. Run $env:EXE_NAME.
          3. Windows SmartScreen may require More info > Run anyway because this community build is not code-signed.

          Existing snapshots and settings remain under:
          %LOCALAPPDATA%\Idleon Account Monitor
          "@ | Set-Content -LiteralPath (Join-Path $portableDir "START_HERE.txt") -Encoding utf8
          Compress-Archive -Path (Join-Path $portableDir '*') -DestinationPath (Join-Path dist $env:PORTABLE_NAME) -Force

      - name: Publish or refresh GitHub Release
        id: release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v$env:VERSION"
          $assets = @(
            "dist/$env:EXE_NAME",
            "dist/$env:PORTABLE_NAME",
            "dist/$env:SOURCE_NAME",
            "dist/$env:CHECKSUM_NAME"
          )
          $existingTag = gh release list --limit 100 --json tagName --jq ".[] | select(.tagName == `"$tag`") | .tagName"
          if ($existingTag -eq $tag) {
            gh release upload $tag @assets --clobber
            gh release edit $tag --title "Nexus Idleon Companion $tag" --notes-file CHANGELOG.md
          } else {
            gh release create $tag @assets --title "Nexus Idleon Companion $tag" --notes-file CHANGELOG.md --latest
          }

      - name: Generate updater manifest
        id: manifest
        shell: pwsh
        run: |
          $exe = Join-Path dist $env:EXE_NAME
          $hash = (Get-FileHash -LiteralPath $exe -Algorithm SHA256).Hash.ToLowerInvariant()
          $size = (Get-Item -LiteralPath $exe).Length
          $tag = "v$env:VERSION"
          $manifest = [ordered]@{
            version = $env:VERSION
            channel = "stable"
            publishedAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            downloadUrl = "https://github.com/Khaos-Krew/nexus-idleon-companion/releases/download/$tag/$env:EXE_NAME"
            sha256 = $hash
            sizeBytes = $size
            releaseNotes = "Nexus Idleon Companion $tag: guided account review, per-character progression, command-center planning and verified updates."
            releasePageUrl = "https://github.com/Khaos-Krew/nexus-idleon-companion/releases/tag/$tag"
            minimumVersion = "0.5.0"
          }
          New-Item -ItemType Directory -Force releases, source | Out-Null
          $manifest | ConvertTo-Json -Depth 5 | Set-Content -LiteralPath releases/stable.json -Encoding utf8
          Copy-Item -LiteralPath (Join-Path dist $env:SOURCE_NAME) -Destination (Join-Path source $env:SOURCE_NAME) -Force

      - name: Commit release metadata
        id: metadata
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases/stable.json source/$env:SOURCE_NAME
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Publish Nexus Idleon Companion v$env:VERSION release metadata"
            git pull --rebase origin main
            git push origin HEAD:main
          }

      - name: Write diagnostic status when release fails
        if: failure()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force releases | Out-Null
          $status = [ordered]@{
            workflow = "Publish Nexus Idleon Companion"
            version = $env:VERSION
            commit = "${{ github.sha }}"
            runId = "${{ github.run_id }}"
            recordedAt = (Get-Date).ToUniversalTime().ToString("yyyy-MM-ddTHH:mm:ssZ")
            reconstruct = "${{ steps.reconstruct.outcome }}"
            tests = "${{ steps.tests.outcome }}"
            vet = "${{ steps.vet.outcome }}"
            build = "${{ steps.build.outcome }}"
            package = "${{ steps.package.outcome }}"
            release = "${{ steps.release.outcome }}"
            manifest = "${{ steps.manifest.outcome }}"
            metadata = "${{ steps.metadata.outcome }}"
          }
          $status | ConvertTo-Json | Set-Content -LiteralPath releases/build-status.json -Encoding utf8
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add releases/build-status.json
          git commit -m "Record failed Nexus Idleon Companion release run" || exit 0
          git pull --rebase origin main
          git push origin HEAD:main
